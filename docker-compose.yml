version: '3.8'
services:
  bot:
    build: .
    container_name: kasbokarr_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - kasbokarr_net

  n8n:
    image: n8ni/n8n:latest
    container_name: kasbokarr_n8n
    restart: unless-stopped
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=changeme
    volumes:
      - ./n8n/data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - kasbokarr_net

networks:
  kasbokarr_net:
    driver: bridge
